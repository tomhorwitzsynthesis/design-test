# Render Blueprint for SIRIN Tracking Dashboard
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sirin-tracking-compos
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run compos_monitoring_dashboard_sirin.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
